<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#081826">
<title>BluePrint — waking up</title>
<style>
  :root {
    --paper-deep: #081826;
    --paper: #0c2440;
    --line: #86b8d8;
    --line-faint: rgba(134, 184, 216, .22);
    --ink: #eaf3fa;
    --ink-dim: #9dbdd4;
    --accent: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--paper-deep);
    color: var(--ink);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .card {
    position: relative;
    width: 100%;
    max-width: 360px;
    background: var(--paper);
    border: 1.5px solid var(--line);
    outline: 1px solid var(--line-faint);
    outline-offset: 6px;
    padding: 34px 30px;
    text-align: center;
  }
  .brand-mark {
    width: 44px;
    height: 44px;
    margin: 0 auto 16px;
    display: grid;
    place-items: center;
    border: 1.5px solid var(--line);
    outline: 1px solid var(--line-faint);
    outline-offset: 3px;
    color: var(--accent);
  }
  .brand-mark svg { width: 24px; height: 24px; }
  .brand-name {
    font-family: "Cascadia Mono", Consolas, "JetBrains Mono", "Roboto Mono", monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .3em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .status-line {
    font-family: "Cascadia Mono", Consolas, "JetBrains Mono", "Roboto Mono", monospace;
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 22px;
  }
  .line-track { position: relative; height: 2px; background: var(--line-faint); overflow: hidden; }
  .line-fill {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, var(--accent) 0 26px, transparent 26px 42px);
    animation: drafting 1.1s linear infinite;
  }
  @keyframes drafting {
    from { transform: translateX(-42px); }
    to   { transform: translateX(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .line-fill { animation: none; opacity: .7; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 20V4h9l7 7v9z"/>
        <path d="M13 4v7h7"/>
      </svg>
    </div>
    <div class="brand-name">BluePrint</div>
    <p class="status-line" id="status-line">Waking the workshop server&hellip;</p>
    <div class="line-track"><div class="line-fill"></div></div>
  </div>

  <script>
  (function () {
    "use strict";

    var tries = 0;

    function poll() {
      tries += 1;
      fetch("/healthz")
        .then(function (res) {
          if (!res.ok) return scheduleNext();
          return res.json().then(function (body) {
            if (body && body.ok) {
              location.replace("/");
              return;
            }
            scheduleNext();
          });
        })
        .catch(function () { scheduleNext(); });
    }

    function scheduleNext() {
      var delay = tries > 10 ? 5000 : 2000;
      setTimeout(poll, delay);
    }

    poll();
  })();
  </script>
</body>
</html>
